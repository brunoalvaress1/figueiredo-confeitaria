<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolos de Pote | Painel Admin</title>
  
  <link rel="icon" type="image/png" href="../imagens/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    
    <main class="admin-content">
      <div id="topbarContainer"></div>
      
      <!-- CARD PRINCIPAL -->
      <div class="admin-card">
        <div class="admin-card-header">
          <h3><i class="bi bi-cake2 texto-rosa"></i> Bolos de Pote</h3>
          <button class="btn-admin" onclick="abrirModalBolo()">
            <i class="bi bi-plus-lg"></i> Adicionar Bolo
          </button>
        </div>
        
        <!-- FILTROS -->
        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
          <div style="flex: 1; min-width: 200px;">
            <input 
              type="text" 
              id="filtroNome" 
              placeholder="🔍 Buscar por nome..." 
              class="form-control" 
              style="padding: 0.7rem 1rem; border-radius: var(--radius-sm); border: 1px solid var(--borda);"
              oninput="filtrarBolos()"
            >
          </div>
          <select id="filtroStatus" class="form-select" style="max-width: 200px; padding: 0.7rem 1rem; border-radius: var(--radius-sm);" onchange="filtrarBolos()">
            <option value="todos">Todos</option>
            <option value="ativos">Apenas ativos</option>
            <option value="inativos">Apenas inativos</option>
            <option value="destaque">Em destaque</option>
          </select>
        </div>
        
        <!-- LISTA/TABELA DE BOLOS -->
        <div id="containerBolos">
          <div class="loading-admin">
            <div class="spinner-border"></div>
            <p>Carregando bolos...</p>
          </div>
        </div>
      </div>
      
    </main>
  </div>

  <!-- MODAL ADICIONAR/EDITAR BOLO -->
  <div class="modal-admin" id="modalBolo">
    <div class="modal-admin-caixa">
      <div class="modal-admin-header">
        <h3 id="tituloModalBolo"><i class="bi bi-plus-circle"></i> Adicionar Bolo</h3>
        <button class="modal-admin-close" onclick="fecharModalBolo()">&times;</button>
      </div>
      
      <form id="formBolo" onsubmit="salvarBolo(event)">
        <div class="modal-admin-body">
          <input type="hidden" id="boloId">
          
          <!-- Upload de imagem -->
          <div class="form-group">
            <label>Imagem do bolo</label>
            <div class="upload-imagem" id="uploadImagemBolo">
              <i class="bi bi-cloud-arrow-up"></i>
              <p>Clique para enviar ou arraste uma imagem</p>
              <p style="font-size: 0.75rem; margin-top: 0.3rem;">PNG, JPG ou WEBP (máx 2MB)</p>
              <input type="file" id="inputImagemBolo" accept="image/*" onchange="previewImagem(event)">
            </div>
            <img id="previewImagemBolo" class="upload-preview" style="display: none;">
          </div>
          
          <!-- Nome -->
          <div class="form-group">
            <label for="nomeBolo">Nome do bolo *</label>
            <input type="text" id="nomeBolo" required placeholder="Ex: Chocolate Belga">
          </div>
          
          <!-- Descrição -->
          <div class="form-group">
            <label for="descricaoBolo">Descrição</label>
            <textarea id="descricaoBolo" rows="2" placeholder="Ex: Brigadeiro cremoso com massa de chocolate"></textarea>
          </div>
          
          <!-- Preço e Ordem -->
          <div class="form-group-row">
            <div class="form-group" style="margin: 0;">
              <label for="precoBolo">Preço (R$) *</label>
              <input type="number" id="precoBolo" step="0.01" min="0" required placeholder="13.00">
            </div>
            <div class="form-group" style="margin: 0;">
              <label for="ordemBolo">Ordem de exibição</label>
              <input type="number" id="ordemBolo" min="0" value="0" placeholder="0">
            </div>
          </div>
          
          <!-- Status -->
          <div style="background: var(--cinza-fundo); padding: 1rem; border-radius: var(--radius-sm); margin-top: 1rem;">
            <div class="form-check">
              <input type="checkbox" id="ativoBolo" checked>
              <label for="ativoBolo">
                <strong>Ativo</strong> <span style="color: var(--texto-claro); font-size: 0.85rem;">— Aparece no site</span>
              </label>
            </div>
            <div class="form-check" style="margin-bottom: 0;">
              <input type="checkbox" id="destaqueBolo">
              <label for="destaqueBolo">
                <strong>Em destaque</strong> <span style="color: var(--texto-claro); font-size: 0.85rem;">— Aparece na página inicial</span>
              </label>
            </div>
          </div>
        </div>
        
        <div class="modal-admin-footer">
          <button type="button" class="btn-admin secundario" onclick="fecharModalBolo()">Cancelar</button>
          <button type="submit" class="btn-admin" id="btnSalvarBolo">
            <i class="bi bi-check-lg"></i> Salvar
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL CONFIRMAR EXCLUSÃO -->
  <div class="modal-admin" id="modalExcluir">
    <div class="modal-admin-caixa" style="max-width: 400px;">
      <div class="modal-admin-body text-center">
        <div style="width: 70px; height: 70px; background: #FEE; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; color: #DC3545; font-size: 2rem;">
          <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <h3 style="font-family: 'Poppins'; font-size: 1.1rem; margin-bottom: 0.5rem;">Tem certeza?</h3>
        <p style="color: var(--texto-medio); font-size: 0.9rem;">
          Esta ação não pode ser desfeita. O bolo <strong id="nomeBoloExcluir"></strong> será removido permanentemente.
        </p>
        <div style="display: flex; gap: 0.7rem; margin-top: 1.5rem;">
          <button class="btn-admin secundario" onclick="fecharModalExcluir()" style="flex: 1;">Cancelar</button>
          <button class="btn-admin perigo" id="btnConfirmarExcluir" style="flex: 1;">
            <i class="bi bi-trash"></i> Excluir
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/admin/admin-config.js"></script>
  <script src="../js/admin/admin-bolos.js"></script>
</body>
</html>
