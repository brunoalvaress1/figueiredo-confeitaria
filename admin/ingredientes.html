<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingredientes | Painel Admin</title>
  
  <link rel="icon" type="image/png" href="../imagens/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    
    <main class="admin-content">
      <div id="topbarContainer"></div>
      
      <!-- CARD PRINCIPAL -->
      <div class="admin-card">
        <div class="admin-card-header">
          <h3><i class="bi bi-flower1 texto-rosa"></i> Ingredientes do Açaí</h3>
          <div style="display: flex; gap: 0.5rem;">
            <a href="categorias.html" class="btn-admin secundario">
              <i class="bi bi-tags"></i> Gerenciar Categorias
            </a>
            <button class="btn-admin" onclick="abrirModalIngrediente()">
              <i class="bi bi-plus-lg"></i> Novo Ingrediente
            </button>
          </div>
        </div>
        
        <!-- FILTROS -->
        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
          <div style="flex: 1; min-width: 200px;">
            <input 
              type="text" 
              id="filtroNome" 
              placeholder="🔍 Buscar por nome..." 
              style="width: 100%; padding: 0.7rem 1rem; border-radius: var(--radius-sm); border: 1px solid var(--borda);"
              oninput="filtrarIngredientes()"
            >
          </div>
          <select id="filtroCategoria" style="padding: 0.7rem 1rem; border-radius: var(--radius-sm); border: 1px solid var(--borda); min-width: 180px;" onchange="filtrarIngredientes()">
            <option value="todas">Todas as categorias</option>
          </select>
          <select id="filtroStatus" style="padding: 0.7rem 1rem; border-radius: var(--radius-sm); border: 1px solid var(--borda); min-width: 180px;" onchange="filtrarIngredientes()">
            <option value="todos">Todos os status</option>
            <option value="disponiveis">Apenas disponíveis</option>
            <option value="indisponiveis">Apenas indisponíveis</option>
          </select>
        </div>
        
        <!-- LISTA/TABELA -->
        <div id="containerIngredientes">
          <div class="loading-admin">
            <div class="spinner-border"></div>
            <p>Carregando ingredientes...</p>
          </div>
        </div>
      </div>
      
    </main>
  </div>

  <!-- MODAL ADICIONAR/EDITAR -->
  <div class="modal-admin" id="modalIngrediente">
    <div class="modal-admin-caixa">
      <div class="modal-admin-header">
        <h3 id="tituloModalIngrediente"><i class="bi bi-plus-circle"></i> Novo Ingrediente</h3>
        <button class="modal-admin-close" onclick="fecharModalIngrediente()">&times;</button>
      </div>
      
      <form id="formIngrediente" onsubmit="salvarIngrediente(event)">
        <div class="modal-admin-body">
          <input type="hidden" id="ingredienteId">
          
          <!-- Upload de imagem -->
          <div class="form-group">
            <label>Imagem do ingrediente</label>
            <div class="upload-imagem">
              <i class="bi bi-cloud-arrow-up"></i>
              <p>Clique para enviar ou arraste uma imagem</p>
              <p style="font-size: 0.75rem; margin-top: 0.3rem;">PNG, JPG ou WEBP (máx 2MB)</p>
              <input type="file" id="inputImagemIngrediente" accept="image/*" onchange="previewImagemIngrediente(event)">
            </div>
            <img id="previewImagemIngrediente" class="upload-preview" style="display: none;">
          </div>
          
          <!-- Nome -->
          <div class="form-group">
            <label for="nomeIngrediente">Nome do ingrediente *</label>
            <input type="text" id="nomeIngrediente" required placeholder="Ex: Morango">
          </div>
          
          <!-- Categoria e Preço -->
          <div class="form-group-row">
            <div class="form-group" style="margin: 0;">
              <label for="categoriaIngrediente">Categoria *</label>
              <select id="categoriaIngrediente" required>
                <option value="">Selecione...</option>
              </select>
              <small style="color: var(--texto-claro); font-size: 0.8rem;">
                <a href="categorias.html" style="color: var(--rosa-principal);">+ Criar nova categoria</a>
              </small>
            </div>
            <div class="form-group" style="margin: 0;">
              <label for="precoIngrediente">Preço adicional (R$)</label>
              <input type="number" id="precoIngrediente" step="0.01" min="0" value="0" placeholder="0.00">
              <small style="color: var(--texto-claro); font-size: 0.8rem;">Deixe 0 para "Grátis"</small>
            </div>
          </div>
          
          <!-- Ordem -->
          <div class="form-group">
            <label for="ordemIngrediente">Ordem de exibição</label>
            <input type="number" id="ordemIngrediente" min="0" value="0">
          </div>
          
          <!-- Disponível -->
          <div style="background: var(--cinza-fundo); padding: 1rem; border-radius: var(--radius-sm); margin-top: 1rem;">
            <div class="form-check" style="margin-bottom: 0;">
              <input type="checkbox" id="disponivelIngrediente" checked>
              <label for="disponivelIngrediente">
                <strong>Disponível</strong> <span style="color: var(--texto-claro); font-size: 0.85rem;">— Aparece na página do açaí</span>
              </label>
            </div>
          </div>
        </div>
        
        <div class="modal-admin-footer">
          <button type="button" class="btn-admin secundario" onclick="fecharModalIngrediente()">Cancelar</button>
          <button type="submit" class="btn-admin" id="btnSalvarIngrediente">
            <i class="bi bi-check-lg"></i> Salvar
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL CONFIRMAR EXCLUSÃO -->
  <div class="modal-admin" id="modalExcluir">
    <div class="modal-admin-caixa" style="max-width: 400px;">
      <div class="modal-admin-body text-center">
        <div style="width: 70px; height: 70px; background: #FEE; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; color: #DC3545; font-size: 2rem;">
          <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <h3 style="font-family: 'Poppins'; font-size: 1.1rem; margin-bottom: 0.5rem;">Excluir ingrediente?</h3>
        <p style="color: var(--texto-medio); font-size: 0.9rem;">
          O ingrediente <strong id="nomeIngredienteExcluir"></strong> será removido permanentemente.
        </p>
        <div style="display: flex; gap: 0.7rem; margin-top: 1.5rem;">
          <button class="btn-admin secundario" onclick="fecharModalExcluir()" style="flex: 1;">Cancelar</button>
          <button class="btn-admin perigo" id="btnConfirmarExcluir" style="flex: 1;">
            <i class="bi bi-trash"></i> Excluir
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/admin/admin-config.js"></script>
  <script src="../js/admin/admin-ingredientes.js"></script>
</body>
</html>
